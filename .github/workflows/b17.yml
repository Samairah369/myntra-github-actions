name: Manual Build and Deploy to Amazon EKS

on:
  workflow_dispatch: # Manual Run button ke liye

jobs:
  deploy:
    name: Deploy-to-EKS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # ==========================================
    # CI PART SHURU HOTA HAI (Authentication & Build)
    # ==========================================

    # 1. AWS Credentials Setup
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 2. AWS ECR Login (Yeh CI ka main part hai)
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 3. Docker Image Build aur ECR Push (CI Core Logic)
    - name: Build, tag, and push image to Amazon ECR
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t 827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:$IMAGE_TAG .
        docker push 827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:$IMAGE_TAG

    # ==========================================
    # CD PART SHURU HOTA HAI (Kubernetes Deployment)
    # ==========================================

    # 4. Kubectl Setup (Fixing the error - Version format changed to standard latest)
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    # 5. Kubeconfig Update
    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --region ap-south-1 --name MyEKS

    # 6. Cluster Verification
    - name: test kubectl connection
      run: |
        kubectl get nodes

    # 7. Deployment to Cluster
    - name: Deploy to Kubernetes
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Agar teacher ki repo mai manifest folder ka naam 'k8s' hai toh yeh perfect chalega.
        # Manifests file mai image placeholder badalna:
        sed -i "s|GITHUB_IMAGE_PLACEHOLDER|827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:$IMAGE_TAG|g" k8s/deployment.yaml
        kubectl apply -f k8s/