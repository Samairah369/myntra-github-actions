name: B17 EKS Project

on:
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Performing Unit Tests
        run: |
          echo "Running unit tests..."
          sleep 10

      - name: Code quality checks
        run: |
          echo "Running code quality checks..."
          sleep 10

      - name: do some calculations
        run: |
          echo "10 + 20 = $((10 + 20))"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 827919544150.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: |
          IMAGE_URI=827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:${{ github.sha }}
          docker build -t $IMAGE_URI .

      - name: Push image to Amazon ECR 
        run: |
          IMAGE_URI=827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:${{ github.sha }}
          docker push $IMAGE_URI

      - name: Verify image in ECR
        run: |
          echo "Checking if image exists in ECR..."
          aws ecr describe-images \
            --repository-name my-ecr-repofor-eks \
            --image-ids imageTag=${{ github.sha }} \
            --region ap-south-1 \
          && echo "✅ Image exists in ECR" \
          || (echo "❌ Image not found in ECR" && exit 1)

  Deploy-to-EKS:
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name MyEKS

      - name: test kubectl connection 
        run: |
          kubectl get nodes

      - name: Update deployment image to new ECR image
        run: |
          IMAGE_URI=827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:${{ github.sha }}
          echo "Updating k8s/app/deployment-service.yml to use $IMAGE_URI"
          sed -i "s|image: .*|image: $IMAGE_URI|" k8s/app/deployment-service.yml
          echo "--- Updated manifest ---"
          cat k8s/app/deployment-service.yml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/app --validate=false