---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myntra
spec:
  replicas: 1              # Sirf 1 pod chalayenge taaki hostPort bind ho sake
  selector:
    matchLabels:
      app: myntra
  template:
    metadata:
      labels:
        app: myntra
    spec:
      containers:
        - name: myntra
          image: 827919544150.dkr.ecr.ap-south-1.amazonaws.com/my-ecr-repofor-eks:latest
          ports:
            - containerPort: 3000
              hostPort: 80         # Direct EC2 Public IP access ke liye